<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview — Benedick Llanda</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#f2ede6;
  --ink:#0f0e0c;
  --warm:#e8e0d4;
  --accent:#c94a1f;
  --muted:#7a7168;
  --rule:#d4ccc0;
  --white:#fff;
}

body{
  background:var(--bg);
  color:var(--ink);
  font-family:'DM Sans',sans-serif;
  font-weight:300;
  cursor:none;
  overflow-x:hidden;
}

/* Cursor */
#cur{
  width:10px;height:10px;background:var(--ink);
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%,-50%);
  mix-blend-mode:difference;
}
#cur-ring{
  width:38px;height:38px;
  border:1.5px solid rgba(15,14,12,0.3);
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  z-index:9998;
  transform:translate(-50%,-50%);
}

/* NAV */
nav{
  position:fixed;
  top:0;left:0;right:0;
  z-index:200;
  padding:0 48px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:rgba(242,237,230,0.85);
  backdrop-filter:blur(18px);
  border-bottom:1px solid var(--rule);
}

.nav-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;
  letter-spacing:.06em;
  text-decoration:none;
  color:var(--ink);
}

.nav-back{
  font-size:13px;
  font-weight:500;
  color:var(--accent);
  text-decoration:none;
}

/* HERO */
#hero{
  padding:140px 72px 60px;
}

.hero-title{
  font-family:'DM Serif Display',serif;
  font-size:clamp(42px,6vw,84px);
  line-height:1;
  letter-spacing:-.03em;
}

.hero-title em{
  font-style:italic;
  color:var(--accent);
}

.hero-sub{
  margin-top:20px;
  max-width:600px;
  color:var(--muted);
  line-height:1.7;
}

/* CHAT */
.chat-wrapper{
  padding:0 72px 120px;
}

.chat-card{
  background:var(--white);
  border:1px solid var(--rule);
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 20px 48px rgba(0,0,0,0.06);
  display:flex;
  flex-direction:column;
  height:70vh;
}

.chat-header{
  padding:20px 24px;
  border-bottom:1px solid var(--rule);
  font-weight:500;
  font-size:12px;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--muted);
}

#chat{
  flex:1;
  padding:24px;
  overflow-y:auto;
}

.message{
  max-width:70%;
  padding:12px 16px;
  margin:10px 0;
  border-radius:16px;
  font-size:14px;
  line-height:1.6;
}

.user{
  background:var(--accent);
  color:white;
  margin-left:auto;
  border-bottom-right-radius:4px;
}

.ai{
  background:var(--warm);
  margin-right:auto;
  border-bottom-left-radius:4px;
}

/* EXPORT BUTTON */
.export-area{
  padding:16px;
  border-top:1px solid var(--rule);
  text-align:right;
}

button{
  padding:12px 18px;
  border-radius:12px;
  border:none;
  background:var(--ink);
  color:white;
  font-family:inherit;
  cursor:none;
  transition:.2s;
}

button:hover{
  background:var(--accent);
}

/* INPUT */
.input-area{
  display:flex;
  border-top:1px solid var(--rule);
  padding:16px;
  gap:12px;
}

input{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--rule);
  font-family:inherit;
  background:var(--bg);
}

@media(max-width:900px){
  #hero,.chat-wrapper{padding-left:24px;padding-right:24px;}
  nav{padding:0 24px;}
}

</style>
</head>

<body>

<div id="cur"></div>
<div id="cur-ring"></div>

<nav>
  <a href="index.html" class="nav-logo">BL</a>
  <a href="index.html" class="nav-back">← Home</a>
</nav>

<section id="hero">
  <h1 class="hero-title">Interview<br><em>My AI</em></h1>
  <p class="hero-sub">
    Recruiters can ask questions about my leadership, product strategy,
    engineering background, and AI projects — anytime.
  </p>
</section>

<div class="chat-wrapper">
  <div class="chat-card">

    <div class="chat-header">
      AI Career Interview Mode
    </div>

    <div id="chat"></div>

    <!-- Export Button -->
    <div class="export-area">
      <button onclick="exportChat()">Export Interview</button>
    </div>

    <div class="input-area">
      <input id="message" placeholder="Ask a question..." />
      <button onclick="sendMessage()">Send</button>
    </div>

  </div>
</div>

<script>

/* Cursor */
const cur=document.getElementById('cur'),
ring=document.getElementById('cur-ring');

let mx=window.innerWidth/2,my=window.innerHeight/2,
rx=mx,ry=my;

document.addEventListener('mousemove',e=>{
  mx=e.clientX;my=e.clientY;
  cur.style.left=mx+'px';
  cur.style.top=my+'px';
});

(function animate(){
  rx+=(mx-rx)*.1;
  ry+=(my-ry)*.1;
  ring.style.left=rx+'px';
  ring.style.top=ry+'px';
  requestAnimationFrame(animate);
})();

/* Chat */
async function sendMessage(){

  const input=document.getElementById("message");
  const chat=document.getElementById("chat");

  if(!input.value) return;

  chat.innerHTML+=`<div class="message user">${input.value}</div>`;

  const response=await fetch("http://localhost:3001/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:input.value})
  });

  const data=await response.json();

  chat.innerHTML+=`<div class="message ai">${data.reply}</div>`;

  input.value="";
  chat.scrollTop=chat.scrollHeight;
}

/* Export */
function exportChat(){

  const messages=document.querySelectorAll(".message");

  let content="AI Interview Transcript\n";
  content+="Candidate: Benedick Llanda\n";
  content+="------------------------------------\n\n";

  messages.forEach(msg=>{
    if(msg.classList.contains("user")){
      content+="Recruiter: "+msg.innerText+"\n\n";
    }
    if(msg.classList.contains("ai")){
      content+="Ben AI: "+msg.innerText+"\n\n";
    }
  });

  const date=new Date().toISOString().split("T")[0];
  const filename=`HireBen-TopCandidate-InterviewTranscript-${date}.txt`;

  const blob=new Blob([content],{type:"text/plain"});
  const link=document.createElement("a");
  link.href=URL.createObjectURL(blob);
  link.download=filename;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

</script>

</body>
</html>
